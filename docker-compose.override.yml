services:
  bot:
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./app:/app/app:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
    # Override read_only for dev so matplotlib can use its font cache.
    read_only: false

  postgres:
    # In dev only, expose postgres on localhost for psql/pgcli inspection.
    ports:
      - "127.0.0.1:5432:5432"
