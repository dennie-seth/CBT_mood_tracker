name: tests

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-progress runs on the same ref when a new commit lands. Saves CI
# minutes on a busy PR.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
